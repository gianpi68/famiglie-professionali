<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famiglie Professionali — Pay Transparency</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6a63;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
    --info-bg: #e6f1fb;
    --info-tc: #0c447c;
    --warn-bg: #fef3cd;
    --warn-tc: #7d5a00;
    --success-bg: #e8f5e9;
    --success-tc: #1b5e20;
    --danger-bg: #fdecea;
    --danger-tc: #a32d2d;
    --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a27;
      --bg3: #333330;
      --text: #e8e6df;
      --text2: #a8a69e;
      --text3: #6e6c65;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --info-bg: #0c2a45;
      --info-tc: #85b7eb;
      --warn-bg: #3a2e00;
      --warn-tc: #f9cb42;
      --success-bg: #0a2a0e;
      --success-tc: #97c459;
      --danger-bg: #2d0f0f;
      --danger-tc: #f09595;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* LAYOUT */
  .app-shell { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--bg);
    border-right: 0.5px solid var(--border);
    padding: .75rem .65rem;
    transition: width .2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar.collapsed { width: 52px; }

  .sidebar-toggle {
    display: flex; align-items: center; gap: 7px;
    background: none; border: none; cursor: pointer;
    color: var(--text2); padding: 5px 6px; margin-bottom: 10px;
    border-radius: var(--radius); width: 100%;
    font-size: 13px; font-family: var(--font);
  }
  .sidebar-toggle:hover { background: var(--bg2); }
  .sidebar-toggle i { font-size: 17px; flex-shrink: 0; }
  .sidebar-label { white-space: nowrap; overflow: hidden; font-weight: 500; }

  .az-form { margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px; }
  .sep { border: none; border-top: 0.5px solid var(--border); margin: 0 0 7px; }

  .az-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 9px; border-radius: var(--radius);
    cursor: pointer; border: 0.5px solid transparent;
    margin-bottom: 4px; transition: all .12s; position: relative;
  }
  .az-item:hover { background: var(--bg2); }
  .az-item.active { background: var(--bg2); border-color: var(--border2); }
  .az-avatar {
    width: 32px; height: 32px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .az-info { flex: 1; min-width: 0; }
  .az-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .az-sub { font-size: 10px; color: var(--text2); }
  .del-az-btn {
    opacity: 0; transition: opacity .15s;
    background: none; border: none; cursor: pointer;
    padding: 3px 5px; color: var(--text2); font-size: 13px;
    border-radius: 4px; flex-shrink: 0; font-family: var(--font);
  }
  .az-item:hover .del-az-btn { opacity: 1; }
  .del-az-btn:hover { color: var(--danger-tc); background: var(--danger-bg); }
  .az-confirm {
    background: var(--danger-bg); border-radius: var(--radius);
    padding: 7px 9px; display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }
  .az-confirm span { font-size: 11px; color: var(--danger-tc); flex: 1; }

  /* MAIN */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar {
    background: var(--bg); border-bottom: 0.5px solid var(--border);
    padding: .75rem 1.25rem; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 10;
  }
  .az-topavatar { width: 34px; height: 34px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .az-topinfo { flex: 1; min-width: 0; }
  .az-topname { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .az-topsub { font-size: 11px; color: var(--text2); }

  /* TABS */
  .tab-bar {
    background: var(--bg); border-bottom: 0.5px solid var(--border);
    display: flex; padding: 0 1.25rem; gap: 2px; overflow-x: auto;
  }
  .tab-btn {
    padding: 10px 14px; font-size: 12px; cursor: pointer;
    border: none; background: transparent; color: var(--text2);
    border-bottom: 2px solid transparent; font-weight: 400;
    white-space: nowrap; font-family: var(--font);
    transition: color .12s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .content { padding: 1.25rem; max-width: 820px; }

  /* CARDS */
  .card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.2rem; margin-bottom: .85rem;
  }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .card-sub { font-size: 11px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

  /* FORMS */
  input, select {
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 10px;
    font-size: 12px; color: var(--text); font-family: var(--font);
    outline: none; transition: border-color .12s;
  }
  input:focus, select:focus { border-color: #378ADD; }
  input::placeholder { color: var(--text3); }

  button {
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 14px;
    font-size: 12px; color: var(--text); cursor: pointer;
    font-family: var(--font); font-weight: 500;
    transition: all .12s;
  }
  button:hover { background: var(--bg2); }
  button:active { transform: scale(.98); }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { opacity: .88; }
  button.danger-btn { color: var(--danger-tc); border-color: var(--danger-bg); background: var(--danger-bg); }

  .icon-btn { background: none; border: none; padding: 4px 6px; color: var(--text2); cursor: pointer; border-radius: 4px; font-size: 15px; }
  .icon-btn:hover { color: var(--text); background: var(--bg2); }
  .icon-btn.danger:hover { color: var(--danger-tc); background: var(--danger-bg); }

  .del-row-btn { background: none; border: none; cursor: pointer; padding: 3px 6px; color: var(--text2); font-size: 14px; border-radius: 4px; flex-shrink: 0; opacity: .4; transition: all .12s; font-family: var(--font); }
  .del-row-btn:hover { opacity: 1; color: var(--danger-tc); background: var(--danger-bg); }

  /* BADGE */
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: var(--radius); }

  /* ROWS */
  .row-item {
    display: flex; align-items: center; gap: 9px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px; margin-bottom: 6px;
  }

  /* BARS */
  .bar-bg { flex: 1; background: var(--bg2); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 6px; border-radius: 4px; transition: width .35s ease; }

  /* SCORE DOTS */
  .score-dot {
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; border: 0.5px solid var(--border2);
    cursor: pointer; transition: all .15s; flex-shrink: 0;
    background: var(--bg); color: var(--text2);
  }

  /* STEP HEADER */
  .step-hdr { margin-bottom: .9rem; }
  .step-hdr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--bg2); color: var(--text2); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .step-title { font-size: 15px; font-weight: 500; }
  .step-desc { font-size: 12px; color: var(--text2); line-height: 1.55; margin-left: 30px; }

  /* SCALE ROW */
  .scale-row { display: flex; gap: 10px; align-items: flex-start; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .scale-row:last-child { border-bottom: none; }

  /* AMBITO ROW */
  .ambito-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .ambito-row:last-of-type { border-bottom: none; }

  /* RUOLO ROW */
  .ruolo-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; border-radius: var(--radius); padding-left: 4px; padding-right: 4px; }
  .ruolo-row:hover { background: var(--bg2); }

  /* CRITERIO OPTION */
  .crit-option { display: flex; align-items: flex-start; gap: 9px; padding: 7px 9px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg); cursor: pointer; margin-bottom: 5px; transition: all .12s; }
  .crit-option:hover { border-color: var(--border2); }

  /* GRID FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }

  .form-field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
  .form-field input, .form-field select { width: 100%; }

  /* ALERT */
  .alert { border-radius: var(--radius); padding: 9px 12px; margin-bottom: .85rem; font-size: 12px; }
  .alert-warn { background: var(--warn-bg); color: var(--warn-tc); }
  .alert-info { background: var(--info-bg); color: var(--info-tc); }
  .alert-success { background: var(--success-bg); color: var(--success-tc); }

  /* NEXT BTN */
  .next-btn { width: 100%; padding: 9px; font-size: 12px; margin-top: .5rem; }

  /* TABLE */
  .mini-table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  .mini-table th, .mini-table td { border: 0.5px solid var(--border); padding: 5px 6px; text-align: center; }
  .mini-table th { background: var(--bg2); font-weight: 500; color: var(--text2); font-size: 10px; }
  .mini-table td.row-hdr { text-align: left; font-weight: 500; }

  /* SLIDER */
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--bg3); border: none; cursor: pointer; flex: 1; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text); cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--text); cursor: pointer; border: none; }

  /* NOTA */
  .nota { font-size: 11px; color: var(--text2); padding: 6px 9px; background: var(--bg2); border-radius: var(--radius); margin-top: 8px; line-height: 1.5; }

  /* EXPORT BTN */
  .export-btn { font-size: 11px; padding: 6px 12px; white-space: nowrap; display: flex; align-items: center; gap: 5px; }

  /* EMPTY */
  .empty { font-size: 12px; color: var(--text2); text-align: center; padding: 1.5rem 0; }

  /* CHIPS */
  .chip { font-size: 11px; padding: 3px 9px; border-radius: var(--radius); background: var(--bg2); border: 0.5px solid var(--border); display: inline-block; }

  /* PESO SUMMARY */
  .peso-total { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: var(--radius); margin-top: 6px; }

  /* PRESET CHIP */
  .preset-chip { font-size: 11px; padding: 3px 8px; border-radius: var(--radius); border: 0.5px solid var(--border2); cursor: pointer; display: inline-block; margin: 2px; transition: all .12s; color: var(--text); background: var(--bg); }
  .preset-chip:hover { background: var(--bg2); }
  .preset-chip.used { border-color: var(--border); color: var(--text2); background: var(--bg2); cursor: default; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div id="topbar" class="topbar"></div>
    <div id="tabbar" class="tab-bar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ── COSTANTI ──────────────────────────────────────────────────
const RUOLI_COLORS_POOL=[
  {bg:"#F1EFE8",tc:"#444441",bar:"#888780"},
  {bg:"#E1F5EE",tc:"#085041",bar:"#5DCAA5"},
  {bg:"#E6F1FB",tc:"#0C447C",bar:"#85B7EB"},
  {bg:"#FAEEDA",tc:"#633806",bar:"#EF9F27"},
  {bg:"#EEEDFE",tc:"#3C3489",bar:"#7F77DD"},
  {bg:"#FAECE7",tc:"#712B13",bar:"#D85A30"},
  {bg:"#FBEAF0",tc:"#72243E",bar:"#D4537E"},
  {bg:"#EAF3DE",tc:"#27500A",bar:"#97C459"},
];
const AMBITI_PRESET=["Produzione","Manutenzione","Qualità","Logistica","Commerciale","Acquisti","Amministrazione","HR","IT","R&D / Tecnico"];
const AMBITO_SCALE=[
  {v:1,label:"Assente / Esternalizzato",desc:"La funzione non esiste internamente o è completamente affidata a terzi. Nessun impatto sul valore prodotto."},
  {v:2,label:"Marginale",desc:"Funzione di supporto. Processi completamente standardizzati, zero differenziazione competitiva."},
  {v:3,label:"Di servizio",desc:"Necessaria al funzionamento quotidiano ma facilmente sostituibile. Contributo indiretto e difficilmente misurabile."},
  {v:4,label:"Rilevante",desc:"Funzione che garantisce qualità o continuità operativa. Contribuisce al risultato ma non è leva primaria di crescita."},
  {v:5,label:"Abilitante",desc:"Supporta direttamente le funzioni core. La sua mancanza limita le performance delle altre aree."},
  {v:6,label:"Strategico",desc:"Incide direttamente sul vantaggio competitivo. Decisioni nell'ambito hanno impatto misurabile su margine o crescita."},
  {v:7,label:"Critico",desc:"Funzione ad altissimo impatto, difficilmente replicabile. La sua performance determina il posizionamento competitivo dell'azienda."},
  {v:8,label:"Core del business",desc:"Ragione d'essere dell'azienda. Massima concentrazione di valore, competenze distintive e risorse strategiche."},
];
const CRITERI_BASE=[
  {id:"c1",label:"Autonomia decisionale",defaultPeso:20,barClr:"#7F77DD",
   def:"Misura il grado di discrezionalità del ruolo nel prendere decisioni, scegliere modalità operative, definire priorità e incidere su indirizzi organizzativi, gestionali o strategici.",
   scale:[
    {v:1,label:"Esecutivo vincolato",desc:"Opera secondo istruzioni dettagliate, procedure definite e supervisione costante. Non prende decisioni autonome, se non su aspetti esecutivi minimi."},
    {v:2,label:"Operativo guidato",desc:"Svolge attività operative ricorrenti con margini limitati di scelta. Può decidere piccole priorità operative, ma all'interno di regole e procedure già stabilite."},
    {v:3,label:"Operativo autonomo",desc:"Gestisce attività definite con una certa autonomia operativa. Può scegliere modalità di esecuzione e organizzare il proprio lavoro entro obiettivi assegnati."},
    {v:4,label:"Gestionale orientato ai risultati",desc:"Decide come raggiungere risultati assegnati, gestendo priorità, tempi e soluzioni operative. Richiede supervisione solo su criticità o decisioni non ordinarie."},
    {v:5,label:"Gestionale su processi",desc:"Prende decisioni gestionali su processi, attività o gruppi di lavoro. Ha autonomia nel definire piani d'azione e nel coordinare risorse entro obiettivi concordati."},
    {v:6,label:"Decisionale rilevante",desc:"Assume decisioni rilevanti su aree organizzative, budget, processi o progetti complessi. Definisce priorità e soluzioni con impatto significativo sui risultati aziendali."},
    {v:7,label:"Strategico-organizzativo",desc:"Contribuisce a decisioni strategiche e definisce indirizzi per funzioni, business unit o ambiti organizzativi ampi. Opera con elevata discrezionalità e basso livello di supervisione."},
    {v:8,label:"Strategico complessivo",desc:"Ha autonomia decisionale strategica complessiva. Definisce indirizzi, politiche e scelte di lungo periodo con impatto sull'intera organizzazione o su una parte rilevante del business."},
  ]},
  {id:"c2",label:"Visione sistemica organizzativa",defaultPeso:20,barClr:"#5DCAA5",
   def:"Misura il livello di comprensione richiesto al ruolo rispetto al funzionamento dell'organizzazione, alle interdipendenze tra funzioni, ai processi aziendali, alla mission e agli obiettivi complessivi.",
   scale:[
    {v:1,label:"Focalizzato sul compito",desc:"Richiede conoscenza limitata alla propria attività specifica. Non è richiesta comprensione del funzionamento complessivo dell'organizzazione."},
    {v:2,label:"Consapevole del processo",desc:"Richiede conoscenza del proprio processo operativo e delle regole di base dell'area di appartenenza. Le interazioni con altre funzioni sono limitate."},
    {v:3,label:"Orientato all'unità",desc:"Richiede comprensione del funzionamento della propria unità organizzativa e delle principali connessioni operative con altri ruoli o reparti."},
    {v:4,label:"Coordinato con altre funzioni",desc:"Deve comprendere i processi collegati alla propria area e le principali interdipendenze organizzative. Deve coordinarsi con altre funzioni per garantire continuità operativa."},
    {v:5,label:"Visione trasversale",desc:"Richiede una visione trasversale dei processi aziendali e capacità di leggere impatti, vincoli e priorità tra più aree organizzative."},
    {v:6,label:"Integratore organizzativo",desc:"Deve interpretare dinamiche organizzative complesse, integrare esigenze di funzioni diverse e contribuire al miglioramento dei processi e dei modelli operativi."},
    {v:7,label:"Visione strategica",desc:"Richiede comprensione ampia della strategia aziendale, del modello di business e delle principali leve organizzative. Traduce indirizzi strategici in scelte gestionali."},
    {v:8,label:"Visione sistemica complessiva",desc:"Possiede e utilizza una visione sistemica complessiva dell'organizzazione, del contesto competitivo, degli stakeholder e delle evoluzioni strategiche di lungo periodo."},
  ]},
  {id:"c3",label:"Risorse gestite",defaultPeso:20,barClr:"#EF9F27",
   def:"Misura l'entità quantitativa e qualitativa delle risorse gestite dal ruolo: persone, strumenti, tecnologie, budget, asset, fornitori, informazioni critiche o processi.",
   scale:[
    {v:1,label:"Risorse individuali",desc:"Utilizza risorse semplici e limitate, prevalentemente individuali, senza responsabilità di gestione o coordinamento."},
    {v:2,label:"Risorse operative di base",desc:"Gestisce strumenti, materiali o informazioni operative di base. Non coordina persone né risorse economiche significative."},
    {v:3,label:"Risorse tecniche specifiche",desc:"Gestisce risorse tecniche o informative specifiche e può coordinare attività semplici di altri soggetti in modo occasionale o limitato."},
    {v:4,label:"Coordinamento operativo",desc:"Coordina risorse operative, strumenti, dati o attività di un piccolo gruppo o processo circoscritto. Può gestire risorse esterne limitate."},
    {v:5,label:"Gestione continuativa",desc:"Gestisce risorse umane, tecniche o economiche con continuità. Ha responsabilità su budget, strumenti, fornitori o team di dimensione contenuta."},
    {v:6,label:"Gestione rilevante e diversificata",desc:"Gestisce risorse rilevanti e diversificate, anche su più processi, progetti o unità operative. Coordina team, budget o asset con impatto significativo."},
    {v:7,label:"Governo di risorse complesse",desc:"Governa risorse complesse, multidisciplinari e ad alto valore economico o strategico. Può gestire più team, budget rilevanti, fornitori critici o asset aziendali importanti."},
    {v:8,label:"Responsabilità strategica",desc:"Ha responsabilità complessiva su risorse aziendali strategiche: persone, investimenti, budget, infrastrutture, tecnologie o asset critici per la continuità e lo sviluppo dell'organizzazione."},
  ]},
  {id:"c4",label:"Rapporti con l'esterno",defaultPeso:20,barClr:"#D85A30",
   def:"Misura intensità, complessità, autonomia e rilevanza delle relazioni con interlocutori esterni: clienti, fornitori, partner, istituzioni, stakeholder sociali, sindacali o politici.",
   scale:[
    {v:1,label:"Nessuna relazione esterna",desc:"Non prevede relazioni significative con l'esterno oppure ha contatti occasionali e puramente esecutivi."},
    {v:2,label:"Contatti standardizzati",desc:"Gestisce contatti semplici e standardizzati con interlocutori esterni, seguendo istruzioni, procedure o script predefiniti."},
    {v:3,label:"Interazioni operative ricorrenti",desc:"Interagisce con interlocutori esterni su attività ricorrenti, fornendo informazioni, raccogliendo dati o gestendo richieste operative."},

const STORAGE_KEY="famiglie_pro_v2";
let _saveTimer=null;
let _lastSaved=null;

// ── GIST SYNC CONFIG ─────────────────────────────────────────
const GH_TOKEN="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";
const GIST_ID="51265e9eb909b056338c48279591b6c6";
const GIST_FILE="dati.json";
const GIST_API=`https://api.github.com/gists/${GIST_ID}`;
let _ghSyncing=false;

async function githubLoad(){
  try{
    const r=await fetch(GIST_API,{
      headers:{
        "Authorization":"token "+GH_TOKEN,
        "Accept":"application/vnd.github.v3+json"
      }
    });
    if(!r.ok){console.warn("Gist load HTTP "+r.status);return false;}
    const gist=await r.json();
    const raw=gist.files[GIST_FILE]&&gist.files[GIST_FILE].content;
    if(!raw||raw.trim()==="{}") return false;
    return JSON.parse(raw);
  }catch(e){console.warn("GitHub load error:",e);return false;}
}

async function githubSave(data){
  if(_ghSyncing) return;
  _ghSyncing=true;
  updateSyncIndicator("saving");
  try{
    const body={files:{}};
    body.files[GIST_FILE]={content:JSON.stringify(data,null,2)};
    const r=await fetch(GIST_API,{
      method:"PATCH",
      headers:{
        "Authorization":"token "+GH_TOKEN,
        "Accept":"application/vnd.github.v3+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    updateSyncIndicator("ok");
  }catch(e){console.warn("GitHub save error:",e);updateSyncIndicator("error");}
  finally{_ghSyncing=false;}
}

let _ghSaveTimer=null;
function scheduleGithubSave(){
  clearTimeout(_ghSaveTimer);
  _ghSaveTimer=setTimeout(()=>{
    const data={aziende:S.aziende,currentAzId:S.currentAzId,sidebarOpen:S.sidebarOpen,tab:S.tab,savedAt:new Date().toISOString()};
    githubSave(data);
  },3000);
}

function updateSyncIndicator(status){
  const el=document.getElementById("sync-indicator");
  if(!el) return;
  if(status==="saving"){el.innerHTML=`<i class="ti ti-cloud-upload" style="margin-right:3px;font-size:12px;"></i>Sincronizzazione…`;el.style.color="var(--text2)";}
  else if(status==="ok"){el.innerHTML=`<i class="ti ti-cloud-check" style="margin-right:3px;font-size:12px;"></i>Sincronizzato`;el.style.color="var(--success-tc)";}
  else if(status==="error"){el.innerHTML=`<i class="ti ti-cloud-x" style="margin-right:3px;font-size:12px;"></i>Errore sync`;el.style.color="var(--danger-tc)";}
  else if(status==="offline"){el.innerHTML=`<i class="ti ti-cloud-off" style="margin-right:3px;font-size:12px;"></i>Solo locale`;el.style.color="var(--text2)";}
}

async function manualSync(){
  updateSyncIndicator("saving");
  const remote=await githubLoad();
  if(!remote){
    // Nessun dato remoto — carica il locale su Gist
    const data={aziende:S.aziende,currentAzId:S.currentAzId,sidebarOpen:S.sidebarOpen,tab:S.tab,savedAt:new Date().toISOString()};
    await githubSave(data);
    return;
  }
  const localTime=_lastSaved?_lastSaved.getTime():0;
  const remoteTime=remote.savedAt?new Date(remote.savedAt).getTime():0;
  if(remoteTime>localTime){
    applyLoadedData(remote);
    saveState();
    render();
    updateSyncIndicator("ok");
    alert("Dati aggiornati dal Gist (versione più recente).");
  } else {
    const data={aziende:S.aziende,currentAzId:S.currentAzId,sidebarOpen:S.sidebarOpen,tab:S.tab,savedAt:new Date().toISOString()};
    await githubSave(data);
  }
}

function saveState(){
  try{
    const data={
      aziende:S.aziende,
      currentAzId:S.currentAzId,
      sidebarOpen:S.sidebarOpen,
      tab:S.tab,
      savedAt:new Date().toISOString()
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    _lastSaved=new Date();
    updateSaveIndicator();
  }catch(e){console.warn("Salvataggio fallito:",e);}
}

function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>saveState(),800);
  scheduleGithubSave();
}

function normalizeData(data){
  data.aziende=data.aziende.map(a=>({
    id:a.id||uid(),
    nome:a.nome||"Azienda",
    settore:a.settore||"",
    ambiti:a.ambiti||[],
    nuovoAmbito:"",
    criteriPesi:a.criteriPesi||{c1:20,c2:20,c3:20,c4:20,c5:20},
    ruoli:(a.ruoli||[]).map(r=>({
      id:r.id||uid(),nome:r.nome||"",mult:r.mult||1.0,
      color:r.color||RUOLI_COLORS_POOL[0],
      valutazione:r.valutazione||{c1:null,c2:null,c3:null,c4:null,c5:null}
    })),
    nuovoRuoloNome:"",nuovoRuoloMult:"",
    selectedRuoloId:a.selectedRuoloId||null,
    posizioni:a.posizioni||[],
    nuovaPos:{nome:"",livello:"",ruoloId:"",ambitoId:""},
    editPosId:null
  }));
  return data;
}

function applyLoadedData(data){
  const d=normalizeData(data);
  S.aziende=d.aziende;
  S.currentAzId=d.currentAzId||S.aziende[0].id;
  S.sidebarOpen=d.sidebarOpen!==undefined?d.sidebarOpen:true;
  S.tab=d.tab||0;
  if(d.savedAt) _lastSaved=new Date(d.savedAt);
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(!data.aziende||!Array.isArray(data.aziende)||data.aziende.length===0)return false;
    applyLoadedData(data);
    return true;
  }catch(e){console.warn("Caricamento fallito:",e);return false;}
}

function updateSaveIndicator(){
  const el=document.getElementById("save-indicator");
  if(!el)return;
  if(_lastSaved){
    const t=_lastSaved.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    el.textContent="✓ Salvato "+t;
    el.style.color="var(--success-tc)";
  }
}

function clearAllData(){
  if(!confirm("Cancellare tutti i dati salvati e ricominciare da capo?"))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

const azCol=(i)=>AZ_COLORS[i%AZ_COLORS.length];
const azIdx=(id)=>S.aziende.findIndex(a=>a.id===id);
const initials=(n)=>n.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
function getPesi(a){const p=a.criteriPesi;const c1=p.c1||0,c2=p.c2||0,c3=p.c3||0,c4=p.c4||0,c5=p.c5||0;const t=c1+c2+c3+c4+c5||100;return{c1:c1/t,c2:c2/t,c3:c3/t,c4:c4/t,c5:c5/t,tot:c1+c2+c3+c4+c5};}
function getRuoloScore(a,r){const v=r.valutazione;if(v.c1==null||v.c2==null||v.c3==null||v.c4==null||v.c5==null)return null;const p=getPesi(a);return parseFloat((v.c1*p.c1+v.c2*p.c2+v.c3*p.c3+v.c4*p.c4+v.c5*p.c5).toFixed(2));}
function getFamilyScore(a,ruolo,amb){const rs=getRuoloScore(a,ruolo);if(rs===null||!amb||amb.peso===0)return null;const ambNorm=parseFloat((((amb.peso-1)/7)*8).toFixed(4));return parseFloat((rs*0.60+ambNorm*0.40).toFixed(2));}
function getFamilies(a){const map={};a.posizioni.forEach(p=>{if(!p.ambitoId||!p.ruoloId)return;const amb=a.ambiti.find(x=>x.id===p.ambitoId);const r=a.ruoli.find(x=>x.id===p.ruoloId);if(!amb||!r)return;const k=`${r.id}||${amb.id}`;if(!map[k])map[k]={ruolo:r,ambito:amb,posizioni:[],score:getFamilyScore(a,r,amb)};map[k].posizioni.push(p);});return Object.values(map).sort((a,b)=>(b.score||0)-(a.score||0));}
function azProg(a){let s=0;if(a.ambiti.some(x=>x.peso>0))s++;if(a.ruoli.some(r=>getRuoloScore(a,r)!==null))s++;if(a.posizioni.length>0)s++;return s;}

        <div><p style="font-size:12px;font-weight:500;color:${active?colSel.tc:"var(--text)"};margin-bottom:1px;">${s.label}</p>

// ── IMPORT XLS ───────────────────────────────────────────────
function normalize(s){return(s||"").toString().trim().toLowerCase().replace(/\s+/g," ");}

function fuzzyMatch(val,list,key){
  const nv=normalize(val);
  // exact
  let m=list.find(x=>normalize(x[key])===nv);
  if(m)return m;
  // starts with
  m=list.find(x=>normalize(x[key]).startsWith(nv)||nv.startsWith(normalize(x[key])));
  if(m)return m;
  // contains
  m=list.find(x=>normalize(x[key]).includes(nv)||nv.includes(normalize(x[key])));
  return m||null;
}

function downloadTemplate(a){
  const wb=XLSX.utils.book_new();
  const header=[["Nome posizione","Livello inquadramento","Ruolo","Ambito"]];
  // example rows using actual ambiti/ruoli if present
  const ambitiEx=a.ambiti.filter(x=>x.peso>0).slice(0,3).map(x=>x.nome);
  const ruoliEx=a.ruoli.slice(0,3).map(r=>r.nome);
  const rows=[];
  for(let i=0;i<Math.max(ambitiEx.length,ruoliEx.length,3);i++){
    rows.push([
      `Posizione esempio ${i+1}`,
      "(es. 3° livello, Quadro, A2)",
      ruoliEx[i]||"(nome ruolo esatto)",
      ambitiEx[i]||"(nome ambito esatto)"
    ]);
  }
  const ws=XLSX.utils.aoa_to_sheet([...header,...rows]);
  ws["!cols"]=[{wch:30},{wch:24},{wch:20},{wch:22}];
  // Style header row bold (openpyxl not available in browser — just set freeze)
  ws["!freeze"]={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb,ws,"Posizioni");
  // Second sheet: reference lists
  const refRows=[["AMBITI DISPONIBILI","","RUOLI DISPONIBILI"],
    ...Array.from({length:Math.max(a.ambiti.length,a.ruoli.length)},(_,i)=>[
      a.ambiti[i]?a.ambiti[i].nome:"",
      "",
      a.ruoli[i]?a.ruoli[i].nome:""
    ])
  ];
  const ws2=XLSX.utils.aoa_to_sheet(refRows);
  ws2["!cols"]=[{wch:24},{wch:4},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"Valori di riferimento");
  XLSX.writeFile(wb,"template_posizioni.xlsx");
}

function doImportXls(a,file,cardEl){
  const resultEl=cardEl.querySelector("#import-result");
  resultEl.innerHTML=`<p style="font-size:12px;color:var(--text2);">Lettura file in corso…</p>`;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(rows.length<2){resultEl.innerHTML=`<p style="font-size:12px;color:var(--danger-tc);">File vuoto o senza dati.</p>`;return;}

      // detect header row
      let startRow=0;
      const h0=normalize(rows[0][0]||"");
      if(h0.includes("nome")||h0.includes("posiz")||h0.includes("name")) startRow=1;

      const ambitiAttivi=a.ambiti.filter(x=>x.peso>0);
      let imported=0,skippedNoName=0;
      const unmatched=[];

      for(let i=startRow;i<rows.length;i++){
        const row=rows[i];
        const nomePosiz=(row[0]||"").toString().trim();
        const livelloRaw=(row[1]||"").toString().trim();
        const ruoloRaw=(row[2]||"").toString().trim();
        const ambitoRaw=(row[3]||"").toString().trim();
        if(!nomePosiz){skippedNoName++;continue;}

        const matchAmb=fuzzyMatch(ambitoRaw,ambitiAttivi,"nome");
        const matchRuolo=fuzzyMatch(ruoloRaw,a.ruoli,"nome");

        if(!matchAmb||!matchRuolo){
          unmatched.push({riga:i+1,nome:nomePosiz,ambito:ambitoRaw,ruolo:ruoloRaw,errAmb:!matchAmb,errRuolo:!matchRuolo});
          continue;
        }
        // evita duplicati (stesso nome + stesso ambito + stesso ruolo)
        const exists=a.posizioni.find(p=>normalize(p.nome)===normalize(nomePosiz)&&p.ambitoId===matchAmb.id&&p.ruoloId===matchRuolo.id);
        if(!exists){
          a.posizioni.push({id:uid(),nome:nomePosiz,livello:livelloRaw,ambitoId:matchAmb.id,ruoloId:matchRuolo.id});
          imported++;
        }
      }

      // Build result HTML
      let html="";
      if(imported>0) html+=`<div class="alert" style="background:var(--success-bg);color:var(--success-tc);margin-bottom:6px;"><i class="ti ti-check" style="margin-right:5px;"></i><strong>${imported}</strong> posizione${imported>1?"i":""} importate con successo.</div>`;
      if(skippedNoName>0) html+=`<div class="alert" style="background:var(--warn-bg);color:var(--warn-tc);margin-bottom:6px;"><i class="ti ti-alert-triangle" style="margin-right:5px;"></i>${skippedNoName} righe senza nome ignorate.</div>`;
      if(unmatched.length>0){
        html+=`<div class="alert" style="background:var(--warn-bg);color:var(--warn-tc);margin-bottom:6px;">
          <p style="font-weight:500;margin-bottom:5px;"><i class="ti ti-alert-triangle" style="margin-right:5px;"></i>${unmatched.length} righe non abbinate — verifica manualmente:</p>
          <table style="width:100%;border-collapse:collapse;font-size:11px;">
            <tr style="border-bottom:0.5px solid rgba(0,0,0,.1);">
              <th style="text-align:left;padding:3px 5px;">Riga</th>
              <th style="text-align:left;padding:3px 5px;">Nome</th>
              <th style="text-align:left;padding:3px 5px;">Ambito</th>
              <th style="text-align:left;padding:3px 5px;">Ruolo</th>
              <th style="text-align:left;padding:3px 5px;">Problema</th>
            </tr>
            ${unmatched.map(u=>`<tr style="border-bottom:0.5px solid rgba(0,0,0,.07);">
              <td style="padding:3px 5px;">${u.riga}</td>
              <td style="padding:3px 5px;">${u.nome}</td>
              <td style="padding:3px 5px;${u.errAmb?"color:var(--danger-tc);font-weight:500;":""}">${u.ambito||"(vuoto)"}</td>
              <td style="padding:3px 5px;${u.errRuolo?"color:var(--danger-tc);font-weight:500;":""}">${u.ruolo||"(vuoto)"}</td>
              <td style="padding:3px 5px;">${[u.errAmb?"ambito non trovato":"",u.errRuolo?"ruolo non trovato":""].filter(Boolean).join(", ")}</td>
            </tr>`).join("")}
          </table>
          <p style="margin-top:6px;font-size:11px;">Controlla che i nomi di ambito e ruolo nel file corrispondano esattamente a quelli definiti in questa azienda. Usa il template per avere i valori corretti.</p>
        </div>`;
      }
      if(imported===0&&unmatched.length===0&&skippedNoName===rows.length-startRow){
        html=`<p style="font-size:12px;color:var(--text2);">Nessuna riga valida trovata nel file.</p>`;
      }
      resultEl.innerHTML=html;
      renderContent();
    }catch(err){
      resultEl.innerHTML=`<div class="alert" style="background:var(--danger-bg);color:var(--danger-tc);">Errore nella lettura del file: ${err.message}</div>`;
    }
  };
  reader.readAsBinaryString(file);
}

// ── UI HELPERS ───────────────────────────────────────────────
function mk(tag,cls,props={}){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  Object.entries(props).forEach(([k,v])=>{
    if(k.startsWith("on"))e[k]=v;
    else e.setAttribute(k,v);
  });
  return e;
}
function mkInput(placeholder,value,oninput,onkeydown){
  const i=mk("input","");i.placeholder=placeholder;i.value=value;
  i.addEventListener("input",oninput);
  if(onkeydown)i.addEventListener("keydown",onkeydown);
  return i;
}
function mkTitle(txt){const p=mk("p","card-title");p.textContent=txt;return p;}
function stepHdr(c,n,t,d){
  const h=mk("div","step-hdr");
  const r=mk("div","step-hdr-row");
  const num=mk("span","step-num");num.textContent=n;
  const ti=mk("span","step-title");ti.textContent=t;
  r.appendChild(num);r.appendChild(ti);h.appendChild(r);
  const ds=mk("p","step-desc");ds.textContent=d;h.appendChild(ds);
  c.appendChild(h);
}
function nextBtn(c,fn,lbl){const b=mk("button","next-btn",{onclick:fn});b.textContent=lbl;c.appendChild(b);}

(async()=>{
  const remote=await githubLoad();
  if(!remote){updateSyncIndicator("offline");return;}
  const localTime=_lastSaved?_lastSaved.getTime():0;
  const remoteTime=remote.savedAt?new Date(remote.savedAt).getTime():0;
  if(remoteTime>localTime){
    applyLoadedData(remote);
    saveState();
    render();
    updateSyncIndicator("ok");
  } else {
    updateSyncIndicator("ok");
    // Se locale è più recente, carica SHA per futuri salvataggi
  }
})();
